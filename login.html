<!DOCTYPE html>
<html>
<head>
<title>Login - ICSE PW Students</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#7c3aed);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:320px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
<h2>ICSE PW Students</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<a href="#">Create Account</a>

</div>

</body>
  </html>
