<!DOCTYPE html>
<html>
<head>
<title>Profile - ICSE PW Students</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.header{
background:linear-gradient(135deg,#2563eb,#7c3aed);
padding:30px;
text-align:center;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:white;
color:#2563eb;
font-size:50px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

.stat-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.stat{
background:#2563eb;
padding:15px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<div class="avatar">A</div>

<h2>Ayush Kumar</h2>

<p>Class 10 ICSE</p>

<p>🟢 Online</p>
</div>

<div class="container">

<div class="card">
<h3>About Me</h3>
<p>
Student of ICSE Board.
Interested in Science, Coding and Mathematics.
</p>
</div>

<div class="card">
<h3>Statistics</h3>

<div class="stat-grid">

<div class="stat">
<h2>25</h2>
<p>Notes</p>
</div>

<div class="stat">
<h2>50</h2>
<p>Friends</p>
</div>

<div class="stat">
<h2>12</h2>
<p>Badges</p>
</div>

</div>
</div>

<div class="card">
<h3>Achievements</h3>
<p>🏆 Top Contributor</p>
<p>📚 25 Notes Uploaded</p>
<p>⭐ Active Student</p>
</div>

</div>

</body>
</html>
