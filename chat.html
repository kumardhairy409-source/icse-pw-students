<!DOCTYPE html>
<html>
<head>
<title>Private Chat - ICSE PW Students</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#2563eb;
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:white;
color:#2563eb;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.status{
font-size:14px;
color:#90ee90;
}

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
max-width:70%;
padding:10px;
border-radius:15px;
margin:10px 0;
}

.received{
background:#1e293b;
}

.sent{
background:#2563eb;
margin-left:auto;
}

.bottom{
display:flex;
padding:10px;
background:#111827;
}

.bottom input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
}

.bottom button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:20px;
background:#2563eb;
color:white;
}
</style>
</head>

<body>

<div class="header">
<div class="avatar">R</div>
<div>
<h3>Rahul Sharma</h3>
<p class="status">🟢 Online</p>
</div>
</div>

<div class="chat-box" id="chatBox">

<div class="message received">
Hello! How are you?
</div>

<div class="message sent">
I am good.
</div>

</div>

<div class="bottom">
<input type="text" id="msg" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){
let msg=document.getElementById("msg").value;

if(msg.trim()!=""){
let box=document.getElementById("chatBox");

box.innerHTML +=
'<div class="message sent">'+msg+'</div>';

document.getElementById("msg").value="";

box.scrollTop=box.scrollHeight;
}
}
</script>

</body>
</html>
